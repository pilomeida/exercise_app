<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Crosstraining Tracker</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --blue: #58a6ff;
      --orange: #f0883e;
      --purple: #a371f7;
      --amber: #d29922;
      --red: #f85149;
      --done-bg: #080c10;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, sans-serif;
      font-size: 17px;
      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto;
    }

    .view { display: none; min-height: 100vh; }
    .view.active { display: block; }

    /* ── HOME HEADER ── */
    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
    }
    .app-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 3px;
    }
    .app-title {
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 12px;
    }
    .progress-row { display: flex; align-items: center; gap: 10px; }
    .progress-track {
      flex: 1; height: 6px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--green); border-radius: 3px;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 13px; color: var(--muted); white-space: nowrap; }

    /* ── HOME LIST ── */
    .list-section-header {
      padding: 14px 20px 6px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
    }

    .session-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .session-row:active { background: var(--surface2); }

    .done-section { background: var(--done-bg); }
    .done-section .session-row { background: transparent; opacity: 0.55; }
    .done-section .session-row:active { opacity: 0.75; background: rgba(255,255,255,0.03); }

    /* Checkbox */
    .cb-wrap {
      flex-shrink: 0; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
    }
    .cb {
      width: 24px; height: 24px; border-radius: 7px;
      border: 2px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; pointer-events: none;
    }
    .cb.done { background: var(--green); border-color: var(--green); }
    .cb.done::after {
      content: '';
      width: 6px; height: 10px;
      border: 2.5px solid #000;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      display: block;
    }

    .session-info { flex: 1; min-width: 0; }
    .session-meta { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
    .session-name {
      font-size: 17px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 10px;
      font-size: 12px; font-weight: 700; margin-top: 5px;
    }
    .badge-amrap { background: rgba(248,81,73,0.12); color: #f85149; }
    .badge-run   { background: rgba(88,166,255,0.12); color: #58a6ff; }
    .badge-int   { background: rgba(240,136,62,0.12); color: #f0883e; }

    .session-arrow { color: var(--border); font-size: 22px; flex-shrink: 0; line-height: 1; }

    /* All-done banner */
    .all-done {
      margin: 24px 20px;
      padding: 28px 20px;
      background: rgba(63,185,80,0.07);
      border: 1px solid rgba(63,185,80,0.25);
      border-radius: 16px; text-align: center;
    }
    .all-done-emoji { font-size: 48px; margin-bottom: 12px; }
    .all-done h2 { color: var(--green); font-size: 24px; margin-bottom: 6px; }
    .all-done p { color: var(--muted); font-size: 16px; }

    /* ── DETAIL HEADER ── */
    .detail-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 16px;
    }
    .back-btn {
      background: none; border: none;
      color: var(--blue); font-size: 17px;
      cursor: pointer; padding: 0;
      display: inline-flex; align-items: center; gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { opacity: 0.6; }
    .detail-meta { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 12px; }
    .detail-title { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; margin-top: 3px; }

    /* ── DETAIL BODY ── */
    .detail-body { padding-bottom: 110px; }

    /* Generic section */
    .d-section { padding: 20px; border-bottom: 1px solid var(--border); }
    .d-section-title {
      font-size: 13px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px;
    }
    .d-section-sub {
      display: inline-block;
      font-size: 13px; font-weight: 700;
      text-transform: none; letter-spacing: 0;
      background: rgba(63,185,80,0.15);
      color: var(--green);
      padding: 2px 9px; border-radius: 8px;
      margin-left: 6px; vertical-align: middle;
    }
    .d-list { list-style: none; }
    .d-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; font-size: 18px; line-height: 1.4;
      border-bottom: 1px solid rgba(48,54,61,0.5);
    }
    .d-item:last-child { border-bottom: none; }
    .d-bullet { color: var(--green); font-size: 16px; flex-shrink: 0; margin-top: 2px; }

    /* Main Work */
    .main-work {
      background: #080f1c;
      border-left: 3px solid var(--blue);
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .main-work-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--blue); margin-bottom: 6px;
    }
    .main-work-heading {
      font-size: 26px; font-weight: 900;
      color: var(--text); letter-spacing: -0.5px; margin-bottom: 16px;
    }
    .main-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; font-size: 20px; font-weight: 600; line-height: 1.3;
      border-bottom: 1px solid rgba(88,166,255,0.1);
    }
    .main-item:last-child { border-bottom: none; }
    .main-bullet { color: var(--blue); flex-shrink: 0; margin-top: 2px; }

    /* Focus cues */
    .focus-section { padding: 20px; border-bottom: 1px solid var(--border); background: #0a0d10; }
    .focus-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; font-size: 18px;
      color: var(--amber); font-style: italic;
      border-bottom: 1px solid rgba(210,153,34,0.1);
    }
    .focus-item:last-child { border-bottom: none; }

    /* Shoulder section */
    .shoulder-section {
      background: #0f0c1a;
      border-left: 3px solid var(--purple);
      padding: 20px; border-bottom: 1px solid var(--border);
    }
    .shoulder-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--purple); margin-bottom: 4px;
    }
    .shoulder-sub { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
    .sh-exercise {
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid rgba(163,113,247,0.15);
    }
    .sh-exercise:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .sh-name { font-size: 17px; font-weight: 700; color: var(--purple); margin-bottom: 8px; }
    .sh-cue {
      font-size: 15px; color: var(--muted);
      padding: 3px 0 3px 16px; position: relative;
    }
    .sh-cue::before { content: '–'; position: absolute; left: 0; color: var(--purple); }
    .sh-rules {
      margin-top: 14px; padding: 12px 14px;
      background: rgba(163,113,247,0.06); border-radius: 10px;
    }
    .sh-rules-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--purple); margin-bottom: 8px;
    }
    .sh-rule { font-size: 15px; color: var(--muted); padding: 3px 0; }

    /* Equipment section */
    .equipment-section {
      background: #12100a;
      border-left: 3px solid var(--amber);
      padding: 20px; border-bottom: 1px solid var(--border);
    }
    .eq-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--amber); margin-bottom: 4px;
    }
    .eq-sub { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
    .eq-group-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      margin: 14px 0 8px; padding-top: 14px;
      border-top: 1px solid rgba(210,153,34,0.12);
    }
    .eq-group-label:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .eq-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 9px 0; font-size: 17px; line-height: 1.4;
      border-bottom: 1px solid rgba(210,153,34,0.08);
    }
    .eq-item:last-child { border-bottom: none; }
    .eq-icon { font-size: 18px; flex-shrink: 0; }
    .eq-note { font-size: 13px; color: var(--muted); display: block; margin-top: 2px; }

    /* Done button */
    .done-btn-bar {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 600px;
      padding: 10px 20px 24px;
      background: linear-gradient(to bottom, transparent, var(--bg) 28%);
    }
    .done-btn {
      width: 100%; padding: 18px;
      background: var(--green); color: #000;
      font-size: 19px; font-weight: 800;
      border: none; border-radius: 14px;
      cursor: pointer; letter-spacing: 0.3px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, background 0.1s;
    }
    .done-btn:active { transform: scale(0.97); background: #2ea043; }
    .done-btn.is-done {
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border);
    }
    .done-btn.is-done:active { transform: none; background: var(--surface2); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════ HOME VIEW ═══════════════════════════════════ -->
<div id="homeView" class="view active">

  <div class="detail-body" id="detailBody"></div>
  <div class="done-btn-bar">
    <button class="done-btn" id="doneBtn" onclick="handleDoneBtn()"></button>

</div>

  { id:18, week:3, day:4, type:'run',   mainHeading:'RUN — INTERVALS',
    mainItems:["8 × (1 min hard / 1 min easy)"], eq:'run' },
  { id:19, week:3, day:5, type:'int',   mainHeading:"INTERVALS — 5 Rounds (3' work / 1' rest)",
    mainItems:["10 squats","10 rows","50 rope","8–10 burpees","max step-ups in remaining time"],
    eq:'w3_int' },
  { id:20, week:3, day:6, type:'run',   mainHeading:'RUN — INTERVALS',
    mainItems:["8 × (1 min hard / 1 min easy)"], eq:'run' },
  { id:21, week:3, day:7, type:'int',   mainHeading:"INTERVALS — 5 Rounds (3' work / 1' rest)",
    mainItems:["10 squats","10 rows","50 rope","8–10 burpees","max step-ups in remaining time"],
    eq:'w3_int' },
];

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════

const STORE_KEY = 'xt_done_v1';

function getDone() {
  try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY)) || []); }
  catch { return new Set(); }
}
function saveDone(ids) {
  localStorage.setItem(STORE_KEY, JSON.stringify([...ids]));
}

let currentId = null;

// ══════════════════════════════════════════════════════════════════
// HOME VIEW
// ══════════════════════════════════════════════════════════════════

function renderHome() {
  const done = getDone();
  const pending = sessions.filter(s => !done.has(s.id));
  const finished = sessions.filter(s => done.has(s.id));

  const pct = (done.size / sessions.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done.size} / ${sessions.length}`;

  let html = '';

  if (pending.length === 0 && done.size > 0) {
    html += `
      <div class="all-done">
        <div class="all-done-emoji">🏆</div>
        <h2>Program Complete!</h2>
        <p>You crushed all 21 sessions. Outstanding work.</p>
      </div>`;
  } else if (pending.length > 0) {
    html += `<div class="list-section-header">Upcoming — ${pending.length} session${pending.length !== 1 ? 's' : ''}</div>`;
    pending.forEach(s => { html += sessionRow(s, false); });
  }

  if (finished.length > 0) {
    html += `<div class="done-section">`;
    html += `<div class="list-section-header">Done — ${finished.length}</div>`;
    finished.forEach(s => { html += sessionRow(s, true); });
    html += `</div>`;
  }

  document.getElementById('homeContent').innerHTML = html;
}

function sessionRow(s, isDone) {
  const bc = s.type === 'run' ? 'badge-run' : s.type === 'int' ? 'badge-int' : 'badge-amrap';
  const bl = s.type === 'run' ? '🏃 Run' : s.type === 'int' ? '⚡ Intervals' : '💪 AMRAP';
  return `
    <div class="session-row" onclick="openDetail(${s.id})">
      <div class="cb-wrap" onclick="toggleDone(event,${s.id})">
        <div class="cb ${isDone ? 'done' : ''}"></div>
      </div>
      <div class="session-info">
        <div class="session-meta">Session #${s.id}</div>
        <div class="session-name">Week ${s.week} · Day ${s.day} — ${s.mainHeading}</div>
        <span class="session-badge ${bc}">${bl}</span>
      </div>
      <div class="session-arrow">›</div>
    </div>`;
}

function toggleDone(e, id) {
  e.stopPropagation();
  const done = getDone();
  done.has(id) ? done.delete(id) : done.add(id);
  saveDone(done);
  renderHome();
}

// ══════════════════════════════════════════════════════════════════
// DETAIL VIEW
// ══════════════════════════════════════════════════════════════════

function openDetail(id) {
  currentId = id;
  const s = sessions.find(x => x.id === id);
  const done = getDone();
  const isDone = done.has(id);

  document.getElementById('detailMeta').textContent = `Session #${s.id} · Week ${s.week} · Day ${s.day}`;
  document.getElementById('detailTitle').textContent = s.mainHeading;

  const btn = document.getElementById('doneBtn');
  if (isDone) {
    btn.textContent = '✓ Completed — tap to go back';
    btn.classList.add('is-done');
  } else {
    btn.textContent = 'Mark as Done →';
    btn.classList.remove('is-done');
  }

  document.getElementById('detailBody').innerHTML = buildDetail(s);

  document.getElementById('homeView').classList.remove('active');
  document.getElementById('detailView').classList.add('active');
  window.scrollTo(0, 0);
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('homeView').classList.add('active');
  currentId = null;
}

function handleDoneBtn() {
  if (!currentId) return;
  const done = getDone();
  if (!done.has(currentId)) {
    done.add(currentId);
    saveDone(done);
  }
  closeDetail();
  renderHome();
}

// ── Detail HTML builder ──────────────────────────────────────────

function buildDetail(s) {
  const badgeClass = s.type === 'run' ? 'badge-run' : s.type === 'int' ? 'badge-int' : 'badge-amrap';
  const badgeLabel = s.type === 'run' ? '🏃 Run' : s.type === 'int' ? '⚡ Intervals' : '💪 AMRAP';

  return `
    <!-- Type badge -->
    <div class="d-section" style="padding-bottom:12px;">
      <span class="session-badge ${badgeClass}" style="font-size:14px;padding:5px 13px;">${badgeLabel}</span>
    </div>

    <!-- Warm-Up -->
    ${buildSection('🔥 Warm-Up', '2 rounds', WARMUP)}

    <!-- Loaded Mobility -->
    ${buildSection('🧘 Loaded Mobility', '2 rounds', MOBILITY)}

    <!-- Main Work -->
    <div class="main-work">
      <div class="main-work-eyebrow">Main Work</div>
      <div class="main-work-heading">${s.mainHeading}</div>
      <ul class="d-list">
        ${s.mainItems.map(it => `
          <li class="main-item">
            <span class="main-bullet">▸</span>
            <span>${it}</span>
          </li>`).join('')}
      </ul>
    </div>

    <!-- Focus Cues -->
    <div class="focus-section">
      <div class="d-section-title">⚡ Focus Cues</div>
      ${FOCUS.map(c => `
        <div class="focus-item">
          <span style="flex-shrink:0;">→</span>
          <span>${c}</span>
        </div>`).join('')}
    </div>

    <!-- Shoulder Routine -->
    <div class="shoulder-section">
      <div class="shoulder-eyebrow">💜 Shoulder Routine</div>
      <div class="shoulder-sub">15 min · 4 rounds · every session</div>
      ${SHOULDER.map(ex => `
        <div class="sh-exercise">
          <div class="sh-name">${ex.name}</div>
          ${ex.cues.map(c => `<div class="sh-cue">${c}</div>`).join('')}
        </div>`).join('')}
      <div class="sh-rules">
        <div class="sh-rules-title">Execution Rules</div>
        ${SHOULDER_RULES.map(r => `<div class="sh-rule">· ${r}</div>`).join('')}
      </div>
    </div>

    <!-- Equipment -->
    ${buildEquipment(s)}
  `;
}

function buildSection(title, sub, items) {
  return `
    <div class="d-section">
      <div class="d-section-title">${title} <span class="d-section-sub">(${sub})</span></div>
      <ul class="d-list">
        ${items.map(it => `
          <li class="d-item">
            <span class="d-bullet">▸</span>
            <span>${it}</span>
          </li>`).join('')}
      </ul>
    </div>`;
}

function buildEquipment(s) {
  const groups = EQ[s.eq];

  function rows(items) {
    return items.map(it => `
      <div class="eq-item">
        <span class="eq-icon">${it.i}</span>
        <div>${it.t}${it.n ? `<span class="eq-note">${it.n}</span>` : ''}</div>
      </div>`).join('');
  }

  return `
    <div class="equipment-section">
      <div class="eq-eyebrow">🎒 Equipment Checklist</div>
      <div class="eq-sub">Everything you need for this session</div>
      <div class="eq-group-label">Main Work</div>
      ${rows(groups.main)}
      <div class="eq-group-label">Warm-Up &amp; Mobility</div>
      ${rows(groups.warmup)}
      <div class="eq-group-label">Shoulder Routine</div>
      ${rows(EQ_SHOULDER)}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════

renderHome();
</script>
</body>
</html>
